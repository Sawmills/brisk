name: release

# Dormant until you publish: fires only when a v* tag is pushed (e.g. v0.1.0),
# or when run manually. Normal pushes and PRs never trigger it.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the GitHub release (and the tag, on manual dispatch)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"          # tag drives the version
          else
            VERSION="$(node -p "require('./cli/package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify cli and sdk versions match
        run: |
          V="${{ steps.v.outputs.version }}"
          CLI="$(node -p "require('./cli/package.json').version")"
          SDK="$(node -p "require('./sdk/package.json').version")"
          if [ "$CLI" != "$V" ] || [ "$SDK" != "$V" ]; then
            echo "::error::version mismatch — expected $V but cli=$CLI sdk=$SDK"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Same gates as ci.yml — don't ship something that wouldn't merge.
      - run: pnpm typecheck
      - run: pnpm --filter @usebrisk/worker test

      - name: Publish @usebrisk/sdk
        run: pnpm --filter @usebrisk/sdk publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @usebrisk/cli
        run: pnpm --filter @usebrisk/cli publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # CHANGELOG.md is the single source of truth for release notes. Pull the
      # pushed version's section out of it (the ### groups + bullets, without the
      # `## [x] - date` heading, which the tag already is).
      - name: Extract release notes
        run: |
          node -e '
            const fs = require("fs");
            const version = process.argv[1];
            const lines = fs.readFileSync("CHANGELOG.md", "utf8").split("\n");
            const start = lines.findIndex((l) => l.startsWith(`## [${version}]`));
            if (start === -1) throw new Error(`no CHANGELOG.md section for ${version}`);
            // Stop at the next release, or the link-reference block at the foot.
            let end = lines.findIndex((l, i) => i > start && (l.startsWith("## ") || /^\[[^\]]+\]:\s/.test(l)));
            if (end === -1) end = lines.length;
            const notes = lines.slice(start + 1, end).join("\n").trim() + "\n";
            fs.writeFileSync("RELEASE_NOTES.md", notes);
          ' "${{ steps.v.outputs.version }}"

      - name: GitHub release
        run: |
          TAG="${{ steps.v.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --notes-file RELEASE_NOTES.md
          fi
        env:
          GH_TOKEN: ${{ github.token }}
